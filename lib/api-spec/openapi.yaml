openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HR Attendance & Meeting Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: Employee management
  - name: attendance
    description: Attendance tracking
  - name: meetings
    description: Meeting management
  - name: tasks
    description: Task management
  - name: announcements
    description: Company announcements
  - name: dashboard
    description: Dashboard summary data
  - name: auth
    description: Authentication operations
  - name: applications
    description: Application tracking

paths:
  /auth/register-org:
    post:
      operationId: registerOrganization
      tags: [auth]
      summary: Register a new organization and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterOrgInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterOrgResponse"
        "400":
          description: Invalid input or organization/user already exists

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh authentication session
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid refresh token

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "204":
          description: Logged out successfully

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current user details
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Unauthorized

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Employees ──────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create a new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get a single employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Attendance ──────────────────────────────────────────────────────────────
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: date
          in: query
          schema:
            type: ["string", "null"]
        - name: month
          in: query
          schema:
            type: ["string", "null"]
          description: "YYYY-MM format to filter by month"
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: createAttendance
      tags: [attendance]
      summary: Create an attendance record (check-in/check-out)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update an attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Get attendance summary stats
      parameters:
        - name: month
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"

  # ── Meetings ────────────────────────────────────────────────────────────────
  /meetings:
    get:
      operationId: listMeetings
      tags: [meetings]
      summary: List meetings
      parameters:
        - name: upcoming
          in: query
          schema:
            type: ["string", "null"]
          description: "Pass 'true' to get only upcoming meetings"
      responses:
        "200":
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: createMeeting
      tags: [meetings]
      summary: Create a meeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings/{id}:
    get:
      operationId: getMeeting
      tags: [meetings]
      summary: Get a single meeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
    patch:
      operationId: updateMeeting
      tags: [meetings]
      summary: Update a meeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
    delete:
      operationId: deleteMeeting
      tags: [meetings]
      summary: Delete a meeting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tasks ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: assigneeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Announcements ───────────────────────────────────────────────────────────
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Applications ────────────────────────────────────────────────────────────
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List all applications
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully

  # ── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/today-attendance:
    get:
      operationId: getTodayAttendance
      tags: [dashboard]
      summary: Get today's check-in list
      responses:
        "200":
          description: Today attendance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodayAttendanceRow"

  /dashboard/upcoming-meetings:
    get:
      operationId: getDashboardUpcomingMeetings
      tags: [dashboard]
      summary: Get next 5 upcoming meetings
      responses:
        "200":
          description: Upcoming meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"

  /dashboard/attendance-chart:
    get:
      operationId: getAttendanceChart
      tags: [dashboard]
      summary: Weekly attendance chart data (last 7 days)
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceChartPoint"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Employee ──────────────────────────────────────────────────────────────
    Employee:
      type: object
      required: [id, name, email, department, role, status, joinDate, createdAt]
      properties:
        id:        { type: integer }
        name:      { type: string }
        email:     { type: string }
        phone:     { type: ["string", "null"] }
        department: { type: string }
        position:  { type: ["string", "null"] }
        role:      { type: string, enum: [ADMIN, EMPLOYEE] }
        status:    { type: string, enum: [ACTIVE, INACTIVE, ON_LEAVE] }
        avatarUrl: { type: ["string", "null"] }
        joinDate:  { type: string }
        salary:    { type: ["number", "null"] }
        createdAt: { type: string }

    EmployeeInput:
      type: object
      required: [name, email, department, role]
      properties:
        name:       { type: string, minLength: 1 }
        email:      { type: string }
        phone:      { type: string }
        department: { type: string, minLength: 1 }
        position:   { type: string }
        role:       { type: string, enum: [ADMIN, EMPLOYEE] }
        status:     { type: string, enum: [ACTIVE, INACTIVE, ON_LEAVE] }
        avatarUrl:  { type: string }
        joinDate:   { type: string }
        salary:     { type: number }

    EmployeeUpdate:
      type: object
      properties:
        name:       { type: string }
        email:      { type: string }
        phone:      { type: string }
        department: { type: string }
        position:   { type: string }
        role:       { type: string, enum: [ADMIN, EMPLOYEE] }
        status:     { type: string, enum: [ACTIVE, INACTIVE, ON_LEAVE] }
        avatarUrl:  { type: string }
        joinDate:   { type: string }
        salary:     { type: number }

    # ── Attendance ────────────────────────────────────────────────────────────
    AttendanceRecord:
      type: object
      required: [id, employeeId, date, status, createdAt]
      properties:
        id:           { type: integer }
        employeeId:   { type: integer }
        date:         { type: string }
        checkIn:      { type: ["string", "null"] }
        checkOut:     { type: ["string", "null"] }
        status:       { type: string, enum: [PRESENT, ABSENT, LATE, HALF_DAY, ON_LEAVE] }
        hoursWorked:  { type: ["number", "null"] }
        notes:        { type: ["string", "null"] }
        createdAt:    { type: string }
        employee:
          $ref: "#/components/schemas/Employee"

    AttendanceInput:
      type: object
      required: [employeeId, date, status]
      properties:
        employeeId:  { type: integer }
        date:        { type: string }
        checkIn:     { type: string }
        checkOut:    { type: string }
        status:      { type: string, enum: [PRESENT, ABSENT, LATE, HALF_DAY, ON_LEAVE] }
        hoursWorked: { type: number }
        notes:       { type: string }

    AttendanceUpdate:
      type: object
      properties:
        checkIn:     { type: string }
        checkOut:    { type: string }
        status:      { type: string, enum: [PRESENT, ABSENT, LATE, HALF_DAY, ON_LEAVE] }
        hoursWorked: { type: number }
        notes:       { type: string }

    AttendanceSummary:
      type: object
      required: [totalDays, presentDays, absentDays, lateDays, attendanceRate]
      properties:
        totalDays:      { type: integer }
        presentDays:    { type: integer }
        absentDays:     { type: integer }
        lateDays:       { type: integer }
        halfDays:       { type: integer }
        leaveDays:      { type: integer }
        attendanceRate: { type: number }

    TodayAttendanceRow:
      type: object
      required: [employeeId, employeeName, department, status]
      properties:
        employeeId:   { type: integer }
        employeeName: { type: string }
        department:   { type: string }
        avatarUrl:    { type: ["string", "null"] }
        checkIn:      { type: ["string", "null"] }
        checkOut:     { type: ["string", "null"] }
        status:       { type: string }

    AttendanceChartPoint:
      type: object
      required: [date, present, absent, late]
      properties:
        date:    { type: string }
        present: { type: integer }
        absent:  { type: integer }
        late:    { type: integer }

    # ── Meeting ───────────────────────────────────────────────────────────────
    Meeting:
      type: object
      required: [id, title, startTime, endTime, organizer, createdAt]
      properties:
        id:          { type: integer }
        title:       { type: string }
        description: { type: ["string", "null"] }
        startTime:   { type: string }
        endTime:     { type: string }
        location:    { type: ["string", "null"] }
        meetLink:    { type: ["string", "null"] }
        organizer:   { type: string }
        status:      { type: string, enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED] }
        attendees:
          type: array
          items:
            type: string
        source:      { type: ["string", "null"] }
        googleEventId: { type: ["string", "null"] }
        createdAt:   { type: string }

    MeetingInput:
      type: object
      required: [title, startTime, endTime, organizer]
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string }
        startTime:   { type: string }
        endTime:     { type: string }
        location:    { type: string }
        meetLink:    { type: string }
        organizer:   { type: string }
        status:      { type: string, enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED] }
        attendees:
          type: array
          items:
            type: string

    MeetingUpdate:
      type: object
      properties:
        title:       { type: string }
        description: { type: string }
        startTime:   { type: string }
        endTime:     { type: string }
        location:    { type: string }
        meetLink:    { type: string }
        organizer:   { type: string }
        status:      { type: string, enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED] }
        attendees:
          type: array
          items:
            type: string

    # ── Task ─────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, title, status, priority, createdAt]
      properties:
        id:          { type: integer }
        title:       { type: string }
        description: { type: ["string", "null"] }
        status:      { type: string, enum: [TODO, IN_PROGRESS, DONE] }
        priority:    { type: string, enum: [LOW, MEDIUM, HIGH, URGENT] }
        assigneeId:  { type: ["integer", "null"] }
        assignee:
          $ref: "#/components/schemas/Employee"
        dueDate:     { type: ["string", "null"] }
        createdAt:   { type: string }

    TaskInput:
      type: object
      required: [title, status, priority]
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string }
        status:      { type: string, enum: [TODO, IN_PROGRESS, DONE] }
        priority:    { type: string, enum: [LOW, MEDIUM, HIGH, URGENT] }
        assigneeId:  { type: integer }
        dueDate:     { type: string }

    TaskUpdate:
      type: object
      properties:
        title:       { type: string }
        description: { type: string }
        status:      { type: string, enum: [TODO, IN_PROGRESS, DONE] }
        priority:    { type: string, enum: [LOW, MEDIUM, HIGH, URGENT] }
        assigneeId:  { type: integer }
        dueDate:     { type: string }

    # ── Announcement ─────────────────────────────────────────────────────────
    Announcement:
      type: object
      required: [id, title, content, author, priority, createdAt]
      properties:
        id:        { type: integer }
        title:     { type: string }
        content:   { type: string }
        author:    { type: string }
        priority:  { type: string, enum: [LOW, NORMAL, HIGH, URGENT] }
        pinned:    { type: boolean }
        createdAt: { type: string }

    AnnouncementInput:
      type: object
      required: [title, content, author]
      properties:
        title:    { type: string, minLength: 1 }
        content:  { type: string, minLength: 1 }
        author:   { type: string }
        priority: { type: string, enum: [LOW, NORMAL, HIGH, URGENT] }
        pinned:   { type: boolean }

    # ── Dashboard ─────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalEmployees, presentToday, meetingsToday, pendingTasks, attendanceRate, activeEmployees, onLeaveToday]
      properties:
        totalEmployees:  { type: integer }
        presentToday:    { type: integer }
        meetingsToday:   { type: integer }
        pendingTasks:    { type: integer }
        attendanceRate:  { type: number }
        activeEmployees: { type: integer }
        onLeaveToday:    { type: integer }

    RegisterOrgInput:
      type: object
      required: [orgName, orgSlug, email, name, password]
      properties:
        orgName: { type: string, minLength: 1 }
        orgSlug: { type: string, minLength: 1 }
        email: { type: string, format: email }
        name: { type: string, minLength: 1 }
        password: { type: string, minLength: 6 }

    RegisterOrgResponse:
      type: object
      required: [organization, user]
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
        user:
          $ref: "#/components/schemas/User"

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    RefreshResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }

    CurrentUserResponse:
      type: object
      required: [user, organization]
      properties:
        user:
          $ref: "#/components/schemas/User"
        organization:
          $ref: "#/components/schemas/Organization"

    Organization:
      type: object
      required: [id, name, slug, plan, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        plan: { type: string }
        createdAt: { type: string }
        settings: { type: object }

    User:
      type: object
      required: [id, organizationId, email, role, createdAt]
      properties:
        id: { type: integer }
        organizationId: { type: integer }
        email: { type: string }
        role: { type: string }
        lastLoginAt: { type: ["string", "null"] }
        createdAt: { type: string }

    # ── Application ───────────────────────────────────────────────────────────
    Application:
      type: object
      required: [id, organizationId, title, link, status, createdAt]
      properties:
        id:             { type: integer }
        organizationId: { type: integer }
        title:          { type: string }
        link:           { type: string }
        status:         { type: string, enum: [WORKING, FILLED, PENDING] }
        notes:          { type: ["string", "null"] }
        createdAt:      { type: string }

    ApplicationInput:
      type: object
      required: [title, link]
      properties:
        title:  { type: string, minLength: 1 }
        link:   { type: string, minLength: 1 }
        status: { type: string, enum: [WORKING, FILLED, PENDING] }
        notes:  { type: string }

    ApplicationUpdate:
      type: object
      properties:
        title:  { type: string }
        link:   { type: string }
        status: { type: string, enum: [WORKING, FILLED, PENDING] }
        notes:  { type: ["string", "null"] }
